name: MLOps Pipeline

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:

    - name: Checkout Repository
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'

    - name: Install Dependencies
      run: |
        pip install --upgrade pip
        pip install -r requirements.txt

    # ✅ Verify Data Files
    - name: Check Data Files
      run: |
        echo "Checking dataset files..."
        ls tourism_project/data

    # ✅ Load Model (sanity check)
    - name: Verify Model File
      run: |
        python -c "
import joblib
model = joblib.load('tourism_project/model_building/best_model.pkl')
print('Model loaded successfully')
"

    # ✅ Run Simple Prediction Test
    - name: Test Prediction
      run: |
        python -c "
import pandas as pd
import joblib

model = joblib.load('tourism_project/model_building/best_model.pkl')

# Dummy input (must match training columns count)
input_data = pd.DataFrame([[0]* (len(model.feature_names_in_))], columns=model.feature_names_in_)

pred = model.predict(input_data)
print('Prediction test successful:', pred)
"

    # ✅ Success Message
    - name: Pipeline Completed
      run: echo "MLOps pipeline executed successfully!"
