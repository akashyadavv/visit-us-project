name: MLOps Pipeline

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install Dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Check Data Files
        run: |
          echo "Checking dataset files..."
          ls tourism_project/data

      - name: Verify Model File
        run: |
          python - <<EOF
import joblib
model = joblib.load('tourism_project/model_building/best_model.pkl')
print("Model loaded successfully")
EOF

      - name: Test Prediction
        run: |
          python - <<EOF
import pandas as pd
import joblib

model = joblib.load('tourism_project/model_building/best_model.pkl')

cols = model.feature_names_in_
input_data = pd.DataFrame([[0]*len(cols)], columns=cols)

pred = model.predict(input_data)
print("Prediction test successful:", pred)
EOF

      - name: Pipeline Completed
        run: echo "MLOps pipeline executed successfully!"
