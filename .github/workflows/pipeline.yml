name: MLOps Pipeline

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install Dependencies
        run: pip install -r requirements.txt

      - name: Check Data Files
        run: ls tourism_project/data

      - name: Verify Model File
        run: python -c "import joblib; joblib.load('tourism_project/model_building/best_model.pkl'); print('Model loaded successfully')"

      - name: Test Prediction
        run: python -c "import pandas as pd, joblib; model=joblib.load('tourism_project/model_building/best_model.pkl'); cols=model.feature_names_in_; df=pd.DataFrame([[0]*len(cols)], columns=cols); pred=model.predict(df); print('Prediction:', pred)"

      - name: Pipeline Completed
        run: echo "Pipeline executed successfully"
